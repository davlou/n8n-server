services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - NODES_EXCLUDE=[]
    volumes:
      - ./n8n-data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - n8n-network
    depends_on:
      - puppeteer-api

  puppeteer-api:
    build: ./puppeteer-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - n8n-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        limits:
          memory: 1024M

networks:
  n8n-network: